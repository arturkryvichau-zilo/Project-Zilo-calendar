<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zilo Calendar – Vehicle Row</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens ── */
    :root {
      --color-black:   #000000;
      --color-white:   #FFFFFF;
      --color-grey3:   #979DB0;
      --color-grey6:   #F0F1F5;
      --color-blue1:   #222693;
      --color-blue4:   #D5D7F8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Rubik', sans-serif;
      background: var(--color-grey6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 8px;
    }

    /* ── Vehicle row ── */
    .vehicle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      width: 512px;
      background: var(--color-white);
      border-radius: 4px;
      cursor: pointer;
      transition: background 150ms ease;
      text-decoration: none;
    }

    .vehicle-row:hover,
    .vehicle-row--hover {
      background: var(--color-blue4);
    }

    /* ── Data container ── */
    .vehicle-row__data {
      display: flex;
      align-items: center;
      gap: 1px;
      flex: 1 0 0;
      min-width: 0;
      font-size: 0; /* remove inline-block gap */
    }

    /* ── Individual data cells ── */
    .vehicle-row__cell {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .vehicle-row__cell--model  { width: 193px; }
    .vehicle-row__cell--plate  { width: 88px; white-space: nowrap; }
    .vehicle-row__cell--vin    { white-space: nowrap; }

    .vehicle-row__label {
      font-size: 12px;
      line-height: 16px;
      color: var(--color-grey3);
      white-space: nowrap;
    }

    .vehicle-row__value {
      font-size: 15px;
      line-height: 20px;
      color: var(--color-black);
      white-space: pre-wrap;
    }

    /* ── Arrow button ── */
    .vehicle-row__btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .vehicle-row__arrow {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Simple chevron drawn with CSS */
    .chevron {
      display: block;
      width: 7px;
      height: 7px;
      border-right: 1.5px solid var(--color-black);
      border-bottom: 1.5px solid var(--color-black);
      transform: rotate(-45deg);
    }
  </style>
</head>
<body>

  <!-- Default state -->
  <div class="vehicle-row">
    <div class="vehicle-row__data">
      <div class="vehicle-row__cell vehicle-row__cell--model">
        <span class="vehicle-row__label">Marka, modal</span>
        <span class="vehicle-row__value">Mersedes-Benz Klassa S</span>
      </div>
      <div class="vehicle-row__cell vehicle-row__cell--plate">
        <span class="vehicle-row__label">Rejestracje</span>
        <span class="vehicle-row__value">WU7203S</span>
      </div>
      <div class="vehicle-row__cell vehicle-row__cell--vin">
        <span class="vehicle-row__label">VIN</span>
        <span class="vehicle-row__value">WAUZZZ4B74N05832</span>
      </div>
    </div>
    <div class="vehicle-row__btn">
      <div class="vehicle-row__arrow">
        <span class="chevron"></span>
      </div>
    </div>
  </div>

  <!-- Hover state (always visible for demo) -->
  <div class="vehicle-row vehicle-row--hover">
    <div class="vehicle-row__data">
      <div class="vehicle-row__cell vehicle-row__cell--model">
        <span class="vehicle-row__label">Marka, modal</span>
        <span class="vehicle-row__value">Mersedes-Benz Klassa S</span>
      </div>
      <div class="vehicle-row__cell vehicle-row__cell--plate">
        <span class="vehicle-row__label">Rejestracje</span>
        <span class="vehicle-row__value">WU7203S</span>
      </div>
      <div class="vehicle-row__cell vehicle-row__cell--vin">
        <span class="vehicle-row__label">VIN</span>
        <span class="vehicle-row__value">WAUZZZ4B74N05832</span>
      </div>
    </div>
    <div class="vehicle-row__btn">
      <div class="vehicle-row__arrow">
        <span class="chevron"></span>
      </div>
    </div>
  </div>

</body>
</html>
